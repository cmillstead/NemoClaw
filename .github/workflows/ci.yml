name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nemoclaw
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nemoclaw/package-lock.json

      - run: npm ci

      - name: Audit dependencies
        # SEC-DEP-001: Fail on high/critical vulnerabilities.
        # To suppress known advisories, add overrides to .npmrc or use
        # `npm audit --omit=dev` if only devDependencies are affected.
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  blueprint-syntax:
    name: Blueprint Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml==6.0.2

      - name: Verify Python syntax
        run: python3 -c "import ast; ast.parse(open('nemoclaw-blueprint/orchestrator/runner.py').read()); print('Python OK')"

      - name: Verify YAML syntax
        run: python3 -c "import yaml; yaml.safe_load(open('nemoclaw-blueprint/policies/openclaw-sandbox.yaml')); print('YAML OK')"

      - name: Verify shell scripts
        run: |
          for f in nemoclaw-blueprint/scripts/*.sh; do
            bash -n "$f" && echo "OK: $f"
          done
